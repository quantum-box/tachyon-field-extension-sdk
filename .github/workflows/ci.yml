name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  browser-sdk:
    name: Browser SDK checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run ts
      - run: npm test
      - run: npm run build
      - run: npm run lint
